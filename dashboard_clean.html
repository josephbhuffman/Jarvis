<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS Control Panel</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            text-align: center;
        }

        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .connection-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #f0f0f0;
            border-radius: 20px;
            margin-top: 15px;
            font-size: 0.9em;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #999;
        }

        .status-dot.connected {
            background: #4CAF50;
            box-shadow: 0 0 8px #4CAF50;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3em;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        #chatMessages {
            height: 300px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            padding: 15px;
            margin-bottom: 15px;
            background: #fafafa;
            border-radius: 8px;
        }

        .user-message {
            background: #007AFF;
            color: white;
            padding: 10px 15px;
            margin: 8px 0;
            border-radius: 18px 18px 4px 18px;
            text-align: right;
            max-width: 80%;
            margin-left: auto;
        }

        .jarvis-message {
            background: #E5E5EA;
            color: #333;
            padding: 10px 15px;
            margin: 8px 0;
            border-radius: 18px 18px 18px 4px;
            text-align: left;
            max-width: 80%;
            margin-right: auto;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #007AFF;
        }

        button {
            padding: 12px 25px;
            background: #007AFF;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: #0051D5;
        }

        button:active {
            transform: scale(0.98);
        }

        .light-controls {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .light-btn {
            padding: 15px;
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .light-btn:hover {
            background: #e8e8e8;
            border-color: #007AFF;
        }

        .light-btn:active {
            transform: scale(0.98);
        }

        .quick-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .quick-btn {
            padding: 10px 15px;
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9em;
        }

        .quick-btn:hover {
            background: #e8e8e8;
            border-color: #007AFF;
        }

        .stats {
            text-align: center;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #007AFF;
        }

        .stat-label {
            color: #666;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>J.A.R.V.I.S.</h1>
            <div class="subtitle">Just A Rather Very Intelligent System</div>
            <div class="connection-status">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Connecting...</span>
            </div>
        </header>

        <div class="grid">
            <!-- Chat Interface -->
            <div class="card">
                <h2>💬 Chat with JARVIS</h2>
                <div id="chatMessages"></div>
                <div class="input-group">
                    <input type="text" id="chatInput" placeholder="Ask JARVIS anything..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()">Send</button>
                </div>
                <div class="quick-actions">
                    <div class="quick-btn" onclick="quickCommand('What\'s the weather?')">☀️ Weather</div>
                    <div class="quick-btn" onclick="quickCommand('What\'s my schedule today?')">📅 Schedule</div>
                    <div class="quick-btn" onclick="quickCommand('Check my email')">📧 Email</div>
                    <div class="quick-btn" onclick="quickCommand('Show my light schedules')">⏰ Schedules</div>
                </div>
            </div>

            <!-- Light Controls -->
            <div class="card">
                <h2>💡 Light Controls</h2>
                <div class="light-controls">
                    <div class="light-btn" onclick="toggleLight('all', 'on')">
                        🔆 All Lights ON
                    </div>
                    <div class="light-btn" onclick="toggleLight('all', 'off')">
                        🌙 All Lights OFF
                    </div>
                    <div class="light-btn" onclick="toggleLight('tall', 'on')">
                        💡 Tall Lamp ON
                    </div>
                    <div class="light-btn" onclick="toggleLight('tall', 'off')">
                        💡 Tall Lamp OFF
                    </div>
                    <div class="light-btn" onclick="toggleLight('bed', 'on')">
                        🛏️ Bedside ON
                    </div>
                    <div class="light-btn" onclick="toggleLight('bed', 'off')">
                        🛏️ Bedside OFF
                    </div>
                </div>
            </div>

            <!-- System Stats -->
            <div class="card">
                <h2>📊 System Status</h2>
                <div class="stats">
                    <div class="stat-value" id="daysOnline">0</div>
                    <div class="stat-label">Days Online</div>
                    <div style="margin-top: 15px; color: #666; font-size: 0.9em;" id="uptime">Calculating...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // MQTT Connection
        const client = mqtt.connect('ws://100.83.210.32:9001');
        
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        client.on('connect', function () {
            console.log('Connected to JARVIS MQTT');
            statusDot.classList.add('connected');
            statusText.textContent = 'Connected';
            client.subscribe('jarvis/response');
            client.subscribe('jarvis/suggestion');
        });

        client.on('disconnect', function() {
            statusDot.classList.remove('connected');
            statusText.textContent = 'Disconnected';
        });

        client.on('error', function(err) {
            console.error('MQTT Error:', err);
            statusDot.classList.remove('connected');
            statusText.textContent = 'Connection Error';
        });

        client.on('message', function (topic, message) {
            const msg = message.toString();
            console.log('MQTT:', topic, msg);
            
            if (topic === 'jarvis/response') {
                addMessage(msg, 'jarvis');
            }
            
            if (topic === 'jarvis/suggestion') {
                addMessage('💡 ' + msg, 'jarvis');
            }
        });

        // Add message to chat
        function addMessage(text, sender) {
            const chatBox = document.getElementById('chatMessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = sender === 'user' ? 'user-message' : 'jarvis-message';
            msgDiv.textContent = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Send message
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (message) {
                addMessage(message, 'user');
                client.publish('jarvis/command', message);
                input.value = '';
            }
        }

        // Quick command
        function quickCommand(command) {
            addMessage(command, 'user');
            client.publish('jarvis/command', command);
        }

        // Track last light command time for rate limiting
        let lastLightCommand = 0;
        const LIGHT_COOLDOWN = 6000; // 6 seconds between commands

        // Toggle light with rate limit protection
        function toggleLight(device, action) {
            const now = Date.now();
            const timeSinceLastCommand = now - lastLightCommand;
            
            if (timeSinceLastCommand < LIGHT_COOLDOWN) {
                const secondsLeft = Math.ceil((LIGHT_COOLDOWN - timeSinceLastCommand) / 1000);
                addMessage(`⚠️ Please wait ${secondsLeft} seconds (Govee rate limit)`, 'jarvis');
                return;
            }
            
            lastLightCommand = now;
            
            let command = '';
            if (device === 'all') {
                command = action === 'on' ? 'Turn on all lights' : 'Turn off all lights';
            } else if (device === 'tall') {
                command = action === 'on' ? 'Turn on tall lamp' : 'Turn off tall lamp';
            } else if (device === 'bed') {
                command = action === 'on' ? 'Turn on bedside lamp' : 'Turn off bedside lamp';
            }
            
            client.publish('jarvis/command', command);
            addMessage(command, 'user');
        }

        // Calculate uptime
        const startTime = new Date('2026-03-03T22:55:58');
        
        function updateUptime() {
            const now = new Date();
            const diff = now - startTime;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            
            document.getElementById('uptime').textContent = `${days}d ${hours}h ${minutes}m`;
            document.getElementById('daysOnline').textContent = days;
        }

        updateUptime();
        setInterval(updateUptime, 60000); // Update every minute
    </script>
</body>
</html>
